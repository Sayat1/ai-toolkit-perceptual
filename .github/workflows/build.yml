# .github/workflows/build.yml
---
name: Build and Push Container Image

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from version.py
        id: version
        run: |
          VERSION=$(python -c "import version; print(version.VERSION)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: tags
        run: |
          BRANCH="${{ github.ref_name }}"
          # Sanitize branch name: replace any character that is not alphanumeric,
          # hyphen, or period with a hyphen, then strip leading/trailing hyphens.
          SAFE_BRANCH=$(echo "${BRANCH}" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/^-//;s/-$//')
          # GHCR requires lowercase repository names
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')

          if [ "${BRANCH}" = "main" ]; then
            # :main mirrors :latest as a HEAD-of-default-branch pointer some
            # tooling reaches for first (e.g. users typing the branch name
            # they cloned from). Same digest as :latest.
            TAGS="${IMAGE}:${{ steps.version.outputs.version }},${IMAGE}:latest,${IMAGE}:main"
          else
            TAGS="${IMAGE}:${SAFE_BRANCH}"
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Disable in-manifest attestations. docker/build-push-action@v6
          # defaults to provenance=mode=max, which wraps the pushed tag in
          # an OCI image index containing an extra unknown/unknown
          # attestation-manifest entry. Older container runtimes (Runpod's
          # included) iterate the index, hit that entry's
          # application/vnd.oci.empty.v1+json payload, and error out with
          # "unsupported media type". Provenance still gets recorded via
          # the actions/attest-build-provenance step below — it lives as a
          # separate sha256-* referrer tag, not inside the image index.
          provenance: false
          sbom: false

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.tags.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

# EOF .github/workflows/build.yml
